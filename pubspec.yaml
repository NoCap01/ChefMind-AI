name: chefmind_ai
description: A professional-grade Flutter app that transforms ingredients into culinary masterpieces using AI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core Flutter & State Management
  flutter_riverpod: ^2.4.0
  go_router: ^12.0.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Firebase & Backend
  firebase_core: ^2.15.0
  cloud_firestore: ^4.17.5
  firebase_auth: ^4.15.3
  firebase_auth_web: ^5.8.12
  firebase_storage: ^11.6.0
  firebase_storage_web: ^3.6.21
  firebase_analytics: ^10.4.0
  cloud_functions: ^4.3.0
  google_sign_in: ^6.1.5


  # AI & API Integration
  http: ^1.1.0
  dio: ^5.3.0
  retry: ^3.1.2

  # Local Storage & Caching
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0
  cached_network_image: ^3.3.0

  # UI & Animations
  lottie: ^2.6.0
  flutter_animate: ^4.2.0
  google_fonts: ^6.1.0
  flutter_staggered_animations: ^1.1.1
  animations: ^2.0.7
  flutter_staggered_grid_view: ^0.7.0

  # Media & Input
  speech_to_text: ^6.3.0
  image_picker: ^1.0.4
  mobile_scanner: ^3.4.1
  camera: ^0.10.5
  permission_handler: ^11.0.1

  # Utility & Sharing
  share_plus: ^7.1.0
  url_launcher: ^6.1.12
  package_info_plus: ^4.1.0
  connectivity_plus: ^4.0.2

  # Charts & Data Visualization
  fl_chart: ^0.63.0
  syncfusion_flutter_charts: ^23.1.36
  table_calendar: ^3.0.9

  # Maps & Location
  google_maps_flutter: ^2.4.0
  geolocator: ^9.0.2

  # Payment & Marketplace
  in_app_purchase: ^3.1.8

  # Social & Community
  flutter_chat_ui: ^1.6.8
  agora_rtc_engine: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  integration_test:
    sdk: flutter
  mockito: ^5.4.2
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
